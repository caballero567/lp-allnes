<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Lista de Precios 2026 - NE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            padding: 12px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        /* Header Diseño 1 - Borde Lateral Dorado */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            margin-bottom: 20px;
            background: #111111;
            border-radius: 16px;
            border-left: 4px solid #fbbf24;
        }
        .logo-badge {
            background: #fbbf24;
            color: #0a0a0a;
            font-weight: 800;
            font-size: 1.3rem;
            padding: 6px 16px;
            border-radius: 12px;
        }
        .title-section h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f1f5f9;
        }
        .title-section h1 span {
            color: #fbbf24;
        }
        .title-section p {
            font-size: 0.65rem;
            color: #6b7280;
            margin-top: 2px;
        }

        /* Filtros */
        .filtros {
            background: #111111;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #1f1f1f;
        }

        .search-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .search-wrapper input {
            flex: 1;
            padding: 12px 14px;
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #e5e5e5;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: #fbbf24;
        }

        .search-wrapper input::placeholder {
            color: #6b7280;
            font-size: 0.85rem;
        }

        .btn-buscar {
            background: #fbbf24;
            color: #0a0a0a;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s;
        }

        .btn-buscar:active {
            transform: scale(0.96);
            background: #f59e0b;
        }

        select {
            width: 100%;
            padding: 12px 14px;
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #e5e5e5;
            margin-bottom: 12px;
            font-family: inherit;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #fbbf24;
        }

        .btn-limpiar {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s;
        }

        .btn-limpiar:active {
            transform: scale(0.98);
            background: #b91c1c;
        }

        /* Resultados info */
        .resultados-info {
            background: #111111;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1f1f1f;
        }

        .resultados-info span:first-child {
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .badge {
            background: #fbbf24;
            color: #0a0a0a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        /* Tarjetas de productos */
        .productos-lista {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .producto-card {
            background: #111111;
            border-radius: 16px;
            padding: 14px;
            border: 1px solid #1f1f1f;
            transition: all 0.2s;
        }

        .producto-card:active {
            background: #1a1a1a;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .producto-marca {
            display: inline-block;
            background: #fbbf24;
            color: #0a0a0a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .fecha-vencimiento {
            display: inline-block;
            background: #1f1f1f;
            color: #fbbf24;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: monospace;
        }

        .producto-nombre {
            font-size: 0.9rem;
            font-weight: 500;
            color: #f1f5f9;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .producto-detalles {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            border-top: 1px solid #1f1f1f;
            padding-top: 10px;
        }

        .detalle-item {
            display: flex;
            flex-direction: column;
        }

        .detalle-label {
            font-size: 0.6rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .detalle-valor {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e5e5e5;
        }

        .precio-cj, .precio-un {
            color: #fbbf24;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
            background: #111111;
            border-radius: 16px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.6rem;
            color: #4b5563;
        }

        /* Responsive adicional */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .producto-detalles {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .detalle-valor {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

// Función de búsqueda inteligente (por palabras separadas)
function buscarProductosInteligente() {
    const searchInput = document.getElementById('searchInput');
    const textoCompleto = searchInput ? searchInput.value.toLowerCase().trim() : '';
    const marcaSeleccionada = document.getElementById('marcaSelect').value;
    
    const palabrasBusqueda = textoCompleto !== '' ? textoCompleto.split(/\s+/) : [];
    
    const filtrados = [];
    
    for(let i = 0; i < productos.length; i++) {
        const p = productos[i];
        const textoCompletoProducto = (p.Marca + ' ' + p.Producto).toLowerCase();
        
        let todasLasPalabrasCoinciden = true;
        for(let j = 0; j < palabrasBusqueda.length; j++) {
            const palabra = palabrasBusqueda[j];
            if(palabra !== '' && !textoCompletoProducto.includes(palabra)) {
                todasLasPalabrasCoinciden = false;
                break;
            }
        }
        
        if(palabrasBusqueda.length > 0 && !todasLasPalabrasCoinciden) {
            continue;
        }
        
        if(marcaSeleccionada !== '' && p.Marca !== marcaSeleccionada) {
            continue;
        }
        
        filtrados.push(p);
    }
    
    const badge = document.getElementById('filtroBadge');
    if(textoCompleto !== '' || marcaSeleccionada !== '') {
        badge.textContent = 'Filtros activos';
        badge.style.background = '#f59e0b';
    } else {
        badge.textContent = 'Sin filtros';
        badge.style.background = '#fbbf24';
    }
    
    const totalSpan = document.getElementById('totalCount');
    totalSpan.textContent = filtrados.length;
    
    renderizarTarjetas(filtrados, textoCompleto);
}

function renderizarTarjetas(productosLista, busqueda) {
    const container = document.getElementById('productosLista');
    
    if(productosLista.length === 0) {
        container.innerHTML = `<div class="empty-message">❌ No se encontraron productos para: "${escapeHtml(busqueda)}"</div>`;
        return;
    }
    
    let html = '';
    for(let i = 0; i < productosLista.length; i++) {
        const p = productosLista[i];
        const fecha = p.FechaVencimiento || 'No registrada';
        html += `
            <div class="producto-card">
                <div class="card-header-row">
                    <div class="producto-marca">${escapeHtml(p.Marca || '')}</div>
                    <div class="fecha-vencimiento">FV ${escapeHtml(fecha)}</div>
                </div>
                <div class="producto-nombre">${escapeHtml(p.Producto || '')}</div>
                <div class="producto-detalles">
                    <div class="detalle-item">
                        <div class="detalle-label">ABREV</div>
                        <div class="detalle-valor">${escapeHtml(p.Abrev || '')}</div>
                    </div>
                    <div class="detalle-item">
                        <div class="detalle-label">FACTOR</div>
                        <div class="detalle-valor">${escapeHtml(p.Factor || '')}</div>
                    </div>
                    <div class="detalle-item">
                        <div class="detalle-label">PRECIO CJ</div>
                        <div class="detalle-valor precio-cj">${formatearPrecio(p.P1CJ)}</div>
                    </div>
                    <div class="detalle-item">
                        <div class="detalle-label">PRECIO UN</div>
                        <div class="detalle-valor precio-un">${formatearPrecio(p.P1UN)}</div>
                    </div>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

function formatearPrecio(valor) {
    if(typeof valor === 'string') {
        valor = valor.replace(/S\/\s*/, '');
    }
    let num = parseFloat(valor);
    if(isNaN(num)) return 'S/ 0.00';
    return 'S/ ' + num.toFixed(2);
}

function cargarMarcas() {
    const marcasSet = new Set();
    productos.forEach(p => {
        if(p.Marca && p.Marca.trim() !== "") {
            marcasSet.add(p.Marca);
        }
    });
    const marcas = Array.from(marcasSet).sort();
    const select = document.getElementById('marcaSelect');
    select.innerHTML = '<option value="">Todas las marcas</option>';
    marcas.forEach(marca => {
        const option = document.createElement('option');
        option.value = marca;
        option.textContent = marca;
        select.appendChild(option);
    });
    console.log('🏷️ Marcas cargadas:', marcas.length);
}

function limpiarFiltros() {
    document.getElementById('searchInput').value = '';
    document.getElementById('marcaSelect').value = '';
    buscarProductosInteligente();
}

function setupEventListeners() {
    const buscarBtn = document.getElementById('buscarBtn');
    const limpiarBtn = document.getElementById('limpiarBtn');
    const marcaSelect = document.getElementById('marcaSelect');
    const searchInput = document.getElementById('searchInput');
    
    if(buscarBtn) buscarBtn.addEventListener('click', buscarProductosInteligente);
    if(limpiarBtn) limpiarBtn.addEventListener('click', limpiarFiltros);
    if(marcaSelect) marcaSelect.addEventListener('change', buscarProductosInteligente);
    if(searchInput) {
        searchInput.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') buscarProductosInteligente();
        });
    }
}

function init() {
    cargarMarcas();
    setupEventListeners();
    buscarProductosInteligente();
}
