// FUNCIONES (no tocar)

function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
}

function buscarProductosInteligente() {
    const texto = document.getElementById('searchInput').value.toLowerCase().trim();
    const marca = document.getElementById('marcaSelect').value;
    const palabras = texto ? texto.split(/\s+/) : [];
    const filtrados = productos.filter(p => {
        const full = (p.Marca + ' ' + p.Producto).toLowerCase();
        return (palabras.length === 0 || palabras.every(w => full.includes(w))) && (marca === '' || p.Marca === marca);
    });
    const badge = document.getElementById('filtroBadge');
    badge.textContent = (texto || marca) ? 'Filtros activos' : 'Sin filtros';
    badge.style.background = (texto || marca) ? '#f59e0b' : '#fbbf24';
    document.getElementById('totalCount').textContent = filtrados.length;
    renderizarTarjetas(filtrados);
}
function renderizarTarjetas(lista) {
    const c = document.getElementById('productosLista');
    if (!lista.length) { c.innerHTML = '<div class="empty-message">❌ No se encontraron productos</div>'; return; }
    c.innerHTML = lista.map(p => `
        <div class="producto-card">
            <div class="card-header-row"><div class="producto-marca">${esc(p.Marca)}</div><div class="fecha-vencimiento">FV ${esc(p.FechaVencimiento||'')}</div></div>
            <div class="producto-nombre">${esc(p.Producto)}</div>
            <div class="producto-detalles">
                <div class="detalle-item"><div class="detalle-label">ABREV</div><div class="detalle-valor">${esc(p.Abrev)}</div></div>
                <div class="detalle-item"><div class="detalle-label">FACTOR</div><div class="detalle-valor">${esc(p.Factor)}</div></div>
                <div class="detalle-item"><div class="detalle-label">PRECIO CJ</div><div class="detalle-valor precio-cj">${fmt(p.P1CJ)}</div></div>
                <div class="detalle-item"><div class="detalle-label">PRECIO UN</div><div class="detalle-valor precio-un">${fmt(p.P1UN)}</div></div>
            </div>
        </div>`).join('');
}
function cargarMarcas() {
    const sel = document.getElementById('marcaSelect');
    const marcas = [...new Set(productos.map(p => p.Marca))].sort();
    sel.innerHTML = '<option value="">Todas las marcas</option>' + marcas.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
}
function limpiarFiltros() {
    document.getElementById('searchInput').value = '';
    document.getElementById('marcaSelect').value = '';
    buscarProductosInteligente();
}
function cargarCategoriasBrief() {
    const cats = [...new Set(briefData.map(r => r.cat))];
    const sel = document.getElementById('briefCatSelect');
    sel.innerHTML = '<option value="">Todas las categorías</option>' + cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
}
function renderBrief() {
    const catFiltro = document.getElementById('briefCatSelect').value;
    const datos = catFiltro ? briefData.filter(r => r.cat === catFiltro) : briefData;
    const lista = document.getElementById('briefLista');
    if (!datos.length) { lista.innerHTML = '<div class="brief-empty">Sin resultados</div>'; return; }
    const grupos = {};
    datos.forEach(r => { if (!grupos[r.cat]) grupos[r.cat] = []; grupos[r.cat].push(r); });
    lista.innerHTML = Object.entries(grupos).map(([cat, rows]) => `
        <div class="brief-categoria-grupo">
            <div class="brief-cat-header" onclick="toggleCat(this)">
                <div class="brief-cat-titulo">📂 ${esc(cat)}</div>
                <div class="brief-cat-count">${rows.length} escala${rows.length>1?'s':''}</div>
                <div class="brief-cat-arrow">▾</div>
            </div>
            <div class="brief-cat-body">${rows.map(r => renderBriefCard(r)).join('')}</div>
        </div>`).join('');
    document.querySelectorAll('.brief-cat-body').forEach(body => body.style.display = 'block');
}
function renderBriefCard(r) {
    const isDescuento = r.prod.includes('DESCUENTO');
    const hasObs = r.obs && r.obs.trim();
    return `<div class="brief-card${isDescuento ? ' descuento' : ''}">
        <div class="brief-card-top"><div class="brief-marca-badge">${esc(r.marca)}</div><div class="brief-tasa">${esc(r.tasa)}</div>${hasObs ? `<div class="brief-obs-badge">⚠ ${esc(r.obs)}</div>` : ''}</div>
        <div class="brief-card-body">
            <div class="brief-mecanica"><div class="brief-seccion-label"><span class="dot"></span> MECÁNICA</div><div class="brief-cantidad">${esc(r.mecCant)}</div><div class="brief-factor">${esc(r.mecFac)}</div></div>
            <div class="brief-bonificacion"><div class="brief-seccion-label"><span class="dot dot-green"></span> BONIFICACIÓN</div><div class="brief-cantidad">${esc(r.bonCant)}</div><div class="brief-factor">${esc(r.bonFac)}</div><div class="brief-bono-producto">Prod: <span>${esc(r.prod)}</span></div></div>
        </div>
    </div>`;
}
function toggleCat(header) {
    const body = header.nextElementSibling;
    const arrow = header.querySelector('.brief-cat-arrow');
    const hidden = body.style.display === 'none';
    body.style.display = hidden ? 'block' : 'none';
    arrow.classList.toggle('collapsed', !hidden);
}
function esc(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function fmt(v) { const n = parseFloat(String(v).replace(/S\/\s*/,'')); return isNaN(n) ? 'S/ 0.00' : 'S/ ' + n.toFixed(2); }

cargarMarcas();
cargarCategoriasBrief();
document.getElementById('buscarBtn').addEventListener('click', buscarProductosInteligente);
document.getElementById('limpiarBtn').addEventListener('click', limpiarFiltros);
document.getElementById('marcaSelect').addEventListener('change', buscarProductosInteligente);
document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') buscarProductosInteligente(); });
buscarProductosInteligente();
renderBrief();
</script>
